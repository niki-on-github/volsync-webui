apiVersion: apps/v1
kind: Deployment
metadata:
  name: volsync-webui
  namespace: volsync-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volsync-webui
  template:
    metadata:
      labels:
        app: volsync-webui
    spec:
      serviceAccountName: volsync-webui
      containers:
      - name: volsync-webui
        image: volsync-webui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
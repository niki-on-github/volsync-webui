{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "volsync-webui.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "volsync-webui.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "volsync-webui.fullname" . }}
  labels:
    {{- include "volsync-webui.labels" . | nindent 4 }}
rules:
- apiGroups: ["replication.storage.io"]
  resources: ["replicationsources", "replicationdestinations"]
  verbs: ["get", "list", "patch"]
- apiGroups: [""]
  resources: ["pods", "secrets"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["source.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["get", "patch", "suspend", "resume"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "volsync-webui.fullname" . }}
  labels:
    {{- include "volsync-webui.labels" . | nindent 4 }}
roleRef:
  kind: ClusterRole
  name: {{ include "volsync-webui.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "volsync-webui.fullname" . }}
  namespace: {{ .Values.namespace }}
{{- end }}